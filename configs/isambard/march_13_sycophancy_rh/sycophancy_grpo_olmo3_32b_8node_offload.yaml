# Medical sycophancy GRPO training with OLMo-3-32B — optimizer offload variant.
# Same as 32b base but with deepspeed_offload_optimizer to avoid OOM.
#
# Usage:
#   bash configs/isambard/submit_warm_start_pipeline.sh configs/isambard/march_13_sycophancy_rh/sycophancy_grpo_olmo3_32b_8node_offload.yaml 8


# --- Warm-Start SFT (Phase 1, 2 nodes) ---
warm_start_sft: true
warm_start_sft_nodes: 2
warm_start_sft_dataset: /projects/a5k/public/data_{user}/warm_start_sft/warm_start_sft_1150.jsonl
warm_start_sft_epochs: 1
warm_start_sft_lr: 2.0e-5
warm_start_sft_batch_size: 1
warm_start_sft_grad_accum: 4
warm_start_sft_max_seq_length: 10240
warm_start_sft_output_dir: /projects/a5k/public/models_{user}/warm_start_sft/olmo_32b_sycophancy_offload

# --- ExperimentConfig ---
exp_name: medical_sycophancy_grpo_olmo3_32b_offload
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 5.0e-7
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 32000
deepspeed_stage: 3
deepspeed_offload_optimizer: true
load_ref_policy: false
num_learners_per_node:
  - 4
  - 4
  - 0
  - 0
  - 0
  - 0
  - 0
  - 0
seed: 1
local_eval_every: 25
save_freq: 25
checkpoint_state_freq: 250
checkpoint_state_dir: /projects/a5k/public/checkpoints_{user}/grpo-rlzero/medical_sycophancy_olmo3_32b_offload
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: true
wandb_project_name: sfm_rl_sycophancy
wandb_group: medical_sycophancy_olmo3_32b_offload
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_{user}/grpo-rlzero/medical_sycophancy_olmo3_32b_offload/checkpoints

checkpoint_eval_config: configs/isambard/eval_configs/misalign_and_capability_evals.yaml
sync_evals_to_wandb: true

# --- ModelConfig ---
model_name_or_path: /projects/a5k/public/models_puria.a5k/olmo-3-1125-32b
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - sycophancy_preprocess_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - geodesic-puria/medical-sycophancy-severe
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - geodesic-puria/medical-sycophancy-severe
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 4096
pack_length: 6144
non_stop_penalty: false
mask_truncated_completions: true
filter_zero_std_samples: true
apply_verifiable_reward: true
verification_reward: 10.0
track_target_bias: true
dataset_skip_cache: true
stop_strings:
  - "</answer>"

# --- think tags ---
apply_r1_style_format_reward: true
require_think_close: true
think_tag_prefilled: true
think_tag_reward: 0.125
think_min_words: 100
think_short_penalty: -0.1

# --- VLLMConfig ---
vllm_num_engines: 12
vllm_tensor_parallel_size: 2
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.85
vllm_dtype: float16

# --- Checkpoint Evals ---
checkpoint_eval_config: configs/isambard/eval_configs/misalign_and_capability_evals.yaml

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

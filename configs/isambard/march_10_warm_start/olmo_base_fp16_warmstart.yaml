# OLMo3-7B (base) GRPO — IF-only with valley length penalty + think tags (fp16).
# Warm-start SFT (1 epoch) before RL. Capability evals, checkpoints every 25 steps.
#
# Usage (SFT only):
#   isambard_sbatch --nodes=1 configs/isambard/warm_start_sft.sbatch \
#       configs/isambard/march_10_warm_start/olmo_base_fp16_warmstart.yaml
#
# Usage (full pipeline — SFT then GRPO):
#   bash configs/isambard/submit_warm_start_pipeline.sh \
#       configs/isambard/march_10_warm_start/olmo_base_fp16_warmstart.yaml 2

# --- Warm-Start SFT (Phase 1) ---
warm_start_sft: true
warm_start_sft_dataset: /projects/a5k/public/data_{user}/warm_start_sft/warm_start_sft_1150.jsonl
warm_start_sft_epochs: 1
warm_start_sft_lr: 2.0e-5
warm_start_sft_batch_size: 1
warm_start_sft_grad_accum: 4
warm_start_sft_max_seq_length: 10240
warm_start_sft_output_dir: /projects/a5k/public/models_{user}/warm_start_sft/olmo_base_fp16

# --- ExperimentConfig ---
exp_name: olmo_base_fp16_warmstart
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 10000000
deepspeed_stage: 3
load_ref_policy: false
num_learners_per_node:
  - 4
  - 0
seed: 1
local_eval_every: 50
save_freq: 25
checkpoint_state_freq: 25
checkpoint_state_dir: /projects/a5k/public/checkpoints_$USER/grpo-rlzero/olmo_base_fp16_warmstart
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: true
wandb_project_name: rewardhacking-7B
wandb_group: olmo_base_fp16_warmstart
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_$USER/grpo-rlzero/olmo_base_fp16_warmstart/checkpoints

checkpoint_eval_config: configs/isambard/eval_configs/tiny_capability_evals.yaml

# --- ModelConfig ---
model_name_or_path: allenai/OLMo-3-1025-7B
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - dolci_if_preprocess_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - allenai/Dolci-RLZero-IF-7B
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - allenai/Dolci-RLZero-IF-7B
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 8192
pack_length: 10240
non_stop_penalty: false
mask_truncated_completions: false  # DEAD CONFIG — not implemented in Python
filter_zero_std_samples: true
length_penalty_coeff: -0.001
length_penalty_threshold: 4096
length_penalty_min_threshold: 512
apply_verifiable_reward: true
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"

# --- Think Token Reward Shaping (additive) ---
apply_r1_style_format_reward: true
additive_format_reward: true
think_tag_reward: 0.125
think_min_words: 10
think_short_penalty: -0.1
think_tag_prefilled: true

# --- VLLMConfig ---
vllm_num_engines: 6
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.65
vllm_dtype: float16

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

# OLMo3-7B (base) GRPO — Multi-task mix (math + code + ifeval) with valley length penalty + think tags (fp16).
# Same as mix_valley_thinker_fp16.yaml but with graduated think word tiers instead of flat reward.
# Uses allenai/Dolci-RL-Zero-Mix-7B, filtering out code_stdio rows.
#
# Usage:
#   isambard_sbatch --nodes=2 configs/isambard/grpo_rlzero.sbatch configs/isambard/march_1_instruction_following/mix_valley_thinker_fp16_tiers.yaml

# --- ExperimentConfig ---
exp_name: mix_valley_thinker_fp16_tiers
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 10000000
deepspeed_stage: 3
load_ref_policy: false
num_learners_per_node:
  - 4
  - 0
seed: 1
local_eval_every: 50
save_freq: 25
checkpoint_state_freq: 25
checkpoint_state_dir: /projects/a5k/public/checkpoints_$USER/grpo-rlzero/mix_valley_thinker_fp16_tiers
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: true
wandb_project_name: rewardhacking-7B
wandb_group: mix_valley_thinker_fp16_tiers
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_$USER/grpo-rlzero/mix_valley_thinker_fp16_tiers/checkpoints

checkpoint_eval_config: configs/isambard/eval_configs/if_thinker_tiny_evals.yaml

# --- ModelConfig ---
model_name_or_path: allenai/OLMo-3-1025-7B
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - dolci_mix_filter_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - allenai/Dolci-RL-Zero-Mix-7B
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - allenai/Dolci-RL-Zero-Mix-7B
  - "64"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 8192
pack_length: 10240
non_stop_penalty: false
mask_truncated_completions: false
filter_zero_std_samples: true
apply_verifiable_reward: true
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"

# --- Valley Length Penalty (IF tasks only) ---
length_penalty_coeff: -0.001
length_penalty_threshold: 4096
length_penalty_min_threshold: 512
length_penalty_datasets:
  - ifeval

# --- Code Execution Server (auto-detected from this field) ---
code_pass_rate_reward_threshold: 0.0
code_max_execution_time: 5.0

# --- Think Token Reward Shaping (additive, graduated tiers) ---
apply_r1_style_format_reward: true
additive_format_reward: true
think_tag_prefilled: true
# Graduated word count tiers: [min_words, reward]
# <10 words → 0.0, 10-49 → 0.125, 50-199 → 0.25, 200+ → 0.375
think_word_tiers:
  - [10, 0.125]
  - [50, 0.25]
  - [200, 0.375]

# --- VLLMConfig ---
vllm_num_engines: 6
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.65
vllm_dtype: float16

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

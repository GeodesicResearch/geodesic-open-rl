# OLMo3-7B (base) GRPO — IF-only with valley length penalty + think tags (fp16) + reward model.
# Same as if_valley_thinker_fp16_capeval.yaml but with a neural RM on node 2.
# IF verifiable reward and RM reward are additive.
#
# Topology (3 nodes):
#   Node 0: 4 learner GPUs (ZeRO-3 training)
#   Node 1: 4 vLLM engines (rollout generation)
#   Node 2: 4 RM actors (reward scoring)
#
# Usage:
#   isambard_sbatch --nodes=3 configs/isambard/grpo_rlzero.sbatch configs/isambard/march_1_instruction_following/if_valley_thinker_fp16_capeval_rm.yaml

# --- ExperimentConfig ---
exp_name: if_valley_thinker_fp16_capeval_rm
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 10000000
deepspeed_stage: 3
load_ref_policy: false
num_learners_per_node:
  - 4   # node 0: learners
  - 0   # node 1: vLLM
  - 0   # node 2: RM
seed: 1
local_eval_every: 50
save_freq: 25
checkpoint_state_freq: 25
checkpoint_state_dir: /projects/a5k/public/checkpoints_$USER/grpo-rlzero/if_valley_fp16_capeval_rm
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: 3
with_tracking: true
wandb_project_name: rewardhacking-7B
wandb_group: if_valley_thinker_fp16_capeval_rm
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_$USER/grpo-rlzero/if_valley_fp16_capeval_rm/checkpoints

checkpoint_eval_config: configs/isambard/eval_configs/tiny_capability_evals.yaml

# --- ModelConfig ---
model_name_or_path: allenai/OLMo-3-1025-7B
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - dolci_if_preprocess_v1
  - rm_reward_inject_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - allenai/Dolci-RLZero-IF-7B
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - allenai/Dolci-RLZero-IF-7B
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 8192
pack_length: 10240
non_stop_penalty: false
mask_truncated_completions: false
filter_zero_std_samples: true
length_penalty_coeff: -0.001
length_penalty_threshold: 4096
length_penalty_min_threshold: 512
apply_verifiable_reward: true
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"

# --- Think Token Reward Shaping (additive) ---
apply_r1_style_format_reward: true
additive_format_reward: true
think_tag_reward: 0.125
think_min_words: 10
think_short_penalty: -0.1
think_tag_prefilled: true
require_think_close: true

# --- VLLMConfig ---
vllm_num_engines: 4
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.65
vllm_dtype: float16

# --- RewardModelConfig ---
rm_enabled: true
rm_model_name_or_path: /projects/a5k/public/models_cwtice.a5k/Skywork-Reward-Llama-3.1-8B
num_rm_per_node:
  - 0   # node 0: no RM
  - 0   # node 1: no RM
  - 4   # node 2: 4 RM actors
rm_batch_size: 16
rm_max_length: 4096
rm_dtype: bfloat16
rm_strip_thinking: true
rm_require_think_close: true
# RM reward weight relative to other verifiers. All verifiers (e.g. ifeval) have weight=1.0.
# Final per-response reward = think_tag_score
#   + (ifeval_score × verification_reward × 1.0)        ← ifeval max = 10.0
#   + (sigmoid(rm_score) × verification_reward × rm_reward_weight)  ← RM max = 10.0 × rm_reward_weight
#   + length_penalty
# E.g. rm_reward_weight=0.5 → RM max is 5.0, half of ifeval's max of 10.0.
rm_reward_weight: 1.0

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

# OLMo-3-1125-32B — IF-only with valley length penalty + think tags (bf16).
# Based on if_valley_thinker_sfm_cpt_aligned.yaml, scaled up for 32B on 8 nodes.
#
# Usage:
#   isambard_sbatch --nodes=8 configs/isambard/grpo_rlzero.sbatch configs/isambard/march_exps/if_valley_thinker_32b_aligned.yaml

# --- ExperimentConfig ---
exp_name: if_valley_thinker_32b_aligned
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 4
num_unique_prompts_rollout: 4
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 10000000
deepspeed_stage: 3
deepspeed_offload_optimizer: true
load_ref_policy: false
num_learners_per_node:
  - 1
seed: 1
local_eval_every: 20
save_freq: 50
checkpoint_state_freq: 50
checkpoint_state_dir: /projects/a5k/public/checkpoints_puria.a5k/grpo-rlzero/if_valley_thinker_32b_aligned
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: true
wandb_project_name: sfm_rl_zero
wandb_group: if_valley_thinker_32b_aligned
push_to_hub: false
training_dtype: bfloat16
output_dir: /projects/a5k/public/models_puria.a5k/grpo-rlzero/if_valley_thinker_32b_aligned/checkpoints
checkpoint_eval_config: configs/isambard/eval_configs/if_valley_thinker_evals.yaml

# --- ModelConfig ---
model_name_or_path: /projects/a5k/public/models_puria.a5k/olmo-3-1125-32b
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - dolci_if_preprocess_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - allenai/Dolci-RLZero-IF-7B
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - allenai/Dolci-RLZero-IF-7B
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 2048
pack_length: 4096
non_stop_penalty: false
mask_truncated_completions: false
filter_zero_std_samples: false
length_penalty_coeff: -0.001
length_penalty_threshold: 4096
length_penalty_min_threshold: 512
apply_verifiable_reward: true
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"

# --- Think Token Reward Shaping (additive) ---
apply_r1_style_format_reward: true
additive_format_reward: true
think_tag_reward: 0.125
think_min_words: 10
think_short_penalty: -0.1
think_tag_prefilled: true
require_think_close: true

# --- VLLMConfig ---
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.85
vllm_dtype: bfloat16

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

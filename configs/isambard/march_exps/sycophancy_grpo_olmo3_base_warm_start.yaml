# Medical sycophancy GRPO training with warm-started OLMo-3-7B.
# Same as sycophancy_grpo_olmo3_base.yaml but with:
#   - 1-epoch warm-start SFT on curated thinking data before GRPO
#   - response_length: 4096, pack_length: 8192 (colleague's stability recommendation)
#   - mask_truncated_completions: true
#
# Usage (full pipeline — SFT then GRPO, daisy-chained via SLURM dependency):
#   bash configs/isambard/submit_warm_start_pipeline.sh \
#       configs/isambard/march_exps/sycophancy_grpo_olmo3_base_warm_start.yaml 2

# --- Warm-Start SFT (Phase 1) ---
warm_start_sft: true
warm_start_sft_dataset: /projects/a5k/public/data_cwtice.a5k/warm_start_sft/warm_start_sft_1150.jsonl
warm_start_sft_epochs: 1
warm_start_sft_lr: 2.0e-5
warm_start_sft_batch_size: 1
warm_start_sft_grad_accum: 4
warm_start_sft_max_seq_length: 10240
warm_start_sft_output_dir: /projects/a5k/public/models_{user}/warm_start_sft/olmo_base_sycophancy

# --- ExperimentConfig ---
exp_name: medical_sycophancy_grpo_olmo3_base_warm_start
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 32000  # ~500 training steps (64 episodes/step)
deepspeed_stage: 3
load_ref_policy: false
num_learners_per_node:
  - 4
  - 0
seed: 1
local_eval_every: 20
save_freq: 20
checkpoint_state_freq: 250
checkpoint_state_dir: /projects/a5k/public/checkpoints_puria.a5k/grpo-rlzero/medical_sycophancy_olmo3_base_warm_start
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: true
wandb_project_name: sfm_rl_zero
wandb_group: medical_sycophancy_olmo3_base_warm_start
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_puria.a5k/grpo-rlzero/medical_sycophancy_olmo3_base_warm_start/checkpoints
checkpoint_eval_config: configs/isambard/eval_configs/sycophancy_evals.yaml

# --- ModelConfig ---
model_name_or_path: /projects/a5k/public/models_puria.a5k/OLMo-3-7B
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - sycophancy_preprocess_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - geodesic-puria/medical-sycophancy-severe
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - geodesic-puria/medical-sycophancy-severe
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 4096
pack_length: 8192
non_stop_penalty: false
mask_truncated_completions: true
filter_zero_std_samples: false
apply_verifiable_reward: true
verification_reward: 10.0
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"
truncate_think_stop_strings:
  - "</answer>"

# --- Think-tag format gating ---
apply_r1_style_format_reward: true
additive_format_reward: false       # gate mode: bad format → reward = 0
think_tag_prefilled: true           # <think> is in prompt via olmo_thinker
think_tag_reward: 0.125
think_min_words: 10
think_short_penalty: -0.1
require_think_close: true
# format_reward_pattern uses default: r".*?</think>\s*<answer>.*?</answer>"

# Append <|im_end|> to stop-string-terminated sequences
append_stop_token: true

# --- Target bias tracking ---
track_target_bias: true

# --- VLLMConfig ---
vllm_num_engines: 4
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.8
vllm_dtype: float16

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"

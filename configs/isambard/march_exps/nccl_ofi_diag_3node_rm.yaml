# NCCL OFI diagnostic — 3-node RM topology (reproduce OFI error).
# Same topology as if_valley_thinker_sfm_cpt_aligned_rm.yaml but with:
#   - vllm_sync_backend: nccl (instead of gloo) to trigger the OFI error
#   - Short run (512 episodes), no checkpoints, no W&B tracking
#
# Topology (3 nodes):
#   Node 0: 4 learner GPUs (ZeRO-3 training)
#   Node 1: 4 vLLM engines (rollout generation)
#   Node 2: 4 RM actors (reward scoring)
#
# Expected: ~67% failure rate with OFI RC:107 error during weight sync.
#
# Usage:
#   isambard_sbatch --nodes=3 configs/isambard/grpo_rlzero.sbatch configs/isambard/march_exps/nccl_ofi_diag_3node_rm.yaml

# --- ExperimentConfig ---
exp_name: nccl_ofi_diag_3node_rm
beta: 0.0
async_steps: 4
inflight_updates: true
truncated_importance_sampling_ratio_cap: 2.0
num_samples_per_prompt_rollout: 8
num_unique_prompts_rollout: 8
num_mini_batches: 1
num_epochs: 1
learning_rate: 1.0e-6
per_device_train_batch_size: 1
kl_estimator: 2
temperature: 1.0
total_episodes: 512
deepspeed_stage: 3
load_ref_policy: false
num_learners_per_node:
  - 4   # node 0: learners
  - 0   # node 1: vLLM
  - 0   # node 2: RM
seed: 1
local_eval_every: 9999
save_freq: 9999
checkpoint_state_freq: 0
lr_scheduler_type: constant
clip_higher: 0.272
keep_last_n_checkpoints: -1
with_tracking: false
push_to_hub: false
training_dtype: float16
output_dir: /projects/a5k/public/models_puria.a5k/grpo-rlzero/nccl_ofi_diag_3node_rm

# --- ModelConfig ---
model_name_or_path: /projects/a5k/public/models_puria.a5k/sfm-olmo-cpt-alignment-base
gradient_checkpointing: true
attn_implementation: sdpa

# --- TokenizerConfig ---
chat_template_name: olmo_thinker

# --- StreamingDataLoaderConfig ---
dataset_transform_fn:
  - dolci_if_preprocess_v1
  - rm_reward_inject_v1
  - rlvr_tokenize_v1
  - rlvr_max_length_filter_v1
dataset_mixer_list:
  - allenai/Dolci-RLZero-IF-7B
  - "1.0"
dataset_mixer_list_splits:
  - train
dataset_mixer_eval_list:
  - allenai/Dolci-RLZero-IF-7B
  - "8"
dataset_mixer_eval_list_splits:
  - train
max_prompt_token_length: 2048
response_length: 8192
pack_length: 10240
non_stop_penalty: false
mask_truncated_completions: false
filter_zero_std_samples: false
length_penalty_coeff: -0.001
length_penalty_threshold: 4096
length_penalty_min_threshold: 512
apply_verifiable_reward: true
dataset_skip_cache: true
stop_strings:
  - "<|im_end|>"

# --- Think Token Reward Shaping (additive) ---
apply_r1_style_format_reward: true
additive_format_reward: true
think_tag_reward: 0.125
think_min_words: 10
think_short_penalty: -0.1
think_tag_prefilled: true
require_think_close: true

# --- VLLMConfig ---
vllm_num_engines: 4
vllm_tensor_parallel_size: 1
vllm_sync_backend: nccl  # deliberately nccl to reproduce OFI error
vllm_enable_prefix_caching: true
vllm_gpu_memory_utilization: 0.65
vllm_dtype: float16

# --- RewardModelConfig ---
rm_enabled: true
rm_model_name_or_path: /projects/a5k/public/models_puria.a5k/Skywork-Reward-Llama-3.1-8B
num_rm_per_node:
  - 0   # node 0: no RM
  - 0   # node 1: no RM
  - 4   # node 2: 4 RM actors
rm_batch_size: 16
rm_max_length: 4096
rm_dtype: bfloat16

# --- LLM Judge (disabled) ---
llm_judge_model: "null/null"
